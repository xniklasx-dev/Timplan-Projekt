name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

env:
  NODE_VERSION: 24.x
  AZURE_WEBAPP_NAME: timplan
  NEXT_PUBLIC_API_BASE: https://api.timplan.app

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - name: Check frontend env
        run: |
          echo "NEXT_PUBLIC_API_BASE=$NEXT_PUBLIC_API_BASE"
          test "$NEXT_PUBLIC_API_BASE" = "https://api.timplan.app"

      - run: npm run build

      - name: Verify built API URL
        run: |
          if grep -R --text "localhost:3001" .next; then
            echo "Found localhost:3001 in build output"
            exit 1
          fi

          grep -R --text "api.timplan.app" .next | head

      - name: Prepare deploy package
        run: |
          rm -rf ../frontend-deploy
          mkdir -p ../frontend-deploy
          cp -R .next/standalone/. ../frontend-deploy/
          mkdir -p ../frontend-deploy/.next
          cp -R .next/static ../frontend-deploy/.next/static
          if [ -d public ]; then
            cp -R public ../frontend-deploy/public
          fi

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_FRONTEND }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: frontend-deploy
