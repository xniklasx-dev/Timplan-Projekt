# Deploys the Next.js backend (located in /backend) to Azure App Service.
# Azure will build via Oryx during deployment.

name: Deploy Backend (Azure App Service)

on:
  push:
    branches: [ main ]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch to deploy"
        required: true
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Deploy to Azure Web App (timplan-api)
        uses: azure/webapps-deploy@v3
        with:
          app-name: "timplan-api"
          slot-name: "Production"
          package: "./backend"
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_API }}
